<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Shopping Cart</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body>
<nav class="navbar bg-dark border-bottom" data-bs-theme="dark">
    <div class="container-fluid" style="padding-left: 40px; padding-right: 40px">
        <div>
            <a class="navbar-brand text-white" th:href="@{/products}">Products</a>
            <a class="navbar-brand text-white" th:href="@{/cart}">Cart (<span th:text="${cartItemCount}">0</span>)</a>
        </div>
        <form th:action="@{/logout}" method="post">
            <button class="btn btn-outline-light btn-sm" type="submit">Logout</button>
        </form>
    </div>
</nav>

<div class="container mt-4">
    <div th:if="${successMessage}" class="alert alert-success" th:text="${successMessage}"></div>
    <div th:if="${errorMessage}" class="alert alert-danger" th:text="${errorMessage}"></div>

    <h2 class="mb-3">Shopping Cart</h2>

    <div th:if="${#lists.isEmpty(cartItems)}" class="alert alert-info">
        Cart is empty.
    </div>

    <div th:unless="${#lists.isEmpty(cartItems)}">
        <table class="table table-bordered align-middle">
            <thead>
            <tr>
                <th>Name</th>
                <th>Price</th>
                <th width="180">Quantity</th>
                <th>Total</th>
                <th width="120">Action</th>
            </tr>
            </thead>
            <tbody>
            <tr th:each="item : ${cartItems}">
                <td th:text="${item.productName}"></td>
                <td th:text="${item.price}"></td>
                <td>
                    <form th:action="@{/cart/update/{id}(id=${item.productId})}" method="post" class="d-flex gap-2">
                        <input type="number" name="quantity" min="1" class="form-control" th:value="${item.quantity}">
                        <button class="btn btn-outline-primary btn-sm" type="submit">Update</button>
                    </form>
                </td>
                <td th:text="${item.lineTotal}"></td>
                <td>
                    <form th:action="@{/cart/remove/{id}(id=${item.productId})}" method="post">
                        <button class="btn btn-danger btn-sm" type="submit">Remove</button>
                    </form>
                </td>
            </tr>
            </tbody>
        </table>

        <div class="d-flex justify-content-between align-items-center">
            <a th:href="@{/products}" class="btn btn-secondary">Continue Shopping</a>
            <div class="text-end">
                <h4>Total: <span th:text="${cartTotal}"></span></h4>
                <form th:action="@{/cart/checkout}" method="post" class="mt-2">
                    <button type="submit" class="btn btn-success">Checkout</button>
                </form>
            </div>
        </div>
    </div>
</div>
</body>
</html>
