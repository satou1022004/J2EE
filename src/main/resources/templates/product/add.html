<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Add Product</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body>
<nav class="navbar bg-dark border-bottom" data-bs-theme="dark">
    <div class="container-fluid" style="padding-left: 40px">
        <a class="navbar-brand text-white" th:href="@{/products}">Home</a>
        <a class="navbar-brand text-white" th:href="@{/products/add}">Products</a>
    </div>
</nav>

<div class="container mt-3">
    <h2>Add Product</h2>
    <form th:action="@{/products/save}" th:object="${product}"
          method="post" enctype="multipart/form-data">
        <div class="form-group mb-2">
            <label for="name">Name:</label>
            <input class="form-control" type="text" th:field="*{name}"
                   id="name" placeholder="Product Name">
        </div>
        <div class="form-group mb-2">
            <label for="image">Image:</label>
            <input class="form-control" type="file"
                   id="image" name="imageFile" accept="image/*">
        </div>
        <div class="form-group mb-2">
            <label for="price">Price:</label>
            <input class="form-control" type="number" th:field="*{price}"
                   id="price" placeholder="Price">
        </div>
        <div class="form-group mb-2">
            <label for="category">Category:</label>
            <select th:field="*{category}" class="form-control" id="category">
                <option th:each="category : ${categories}"
                        th:value="${category.id}"
                        th:text="${category.name}"></option>
            </select>
        </div>
        <button type="submit" class="btn btn-success mt-2">Add Product</button>
    </form>
</div>
</body>
</html>
