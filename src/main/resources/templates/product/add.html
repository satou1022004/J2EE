<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Product Form</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body>
<nav class="navbar bg-dark border-bottom" data-bs-theme="dark">
    <div class="container-fluid" style="padding-left: 40px; padding-right: 40px">
        <div>
            <a class="navbar-brand text-white" th:href="@{/products}">Products</a>
            <a class="navbar-brand text-white" th:href="@{/cart}">Cart (<span th:text="${cartItemCount}">0</span>)</a>
        </div>
        <form th:action="@{/logout}" method="post">
            <button class="btn btn-outline-light btn-sm" type="submit">Logout</button>
        </form>
    </div>
</nav>

<div class="container mt-4">
    <h2 th:text="${product.id == null} ? 'Add Product' : 'Edit Product'">Add Product</h2>
    <form th:action="@{/products/save}" th:object="${product}" method="post" enctype="multipart/form-data">
        <input type="hidden" th:field="*{id}">

        <div class="form-group mb-2">
            <label for="name">Name:</label>
            <input class="form-control" type="text" th:field="*{name}" id="name" placeholder="Product Name">
            <div class="text-danger" th:if="${#fields.hasErrors('name')}" th:errors="*{name}"></div>
        </div>

        <div class="form-group mb-2">
            <label for="image">Image:</label>
            <input class="form-control" type="file" id="image" name="imageFile" accept="image/*">
            <div class="mt-2" th:if="${product.id != null and product.image != null}">
                <img th:src="@{/products/image/{id}(id=${product.id})}" alt="Current Image" width="160" height="120">
            </div>
        </div>

        <div class="form-group mb-2">
            <label for="price">Price:</label>
            <input class="form-control" type="number" th:field="*{price}" id="price" placeholder="Price">
            <div class="text-danger" th:if="${#fields.hasErrors('price')}" th:errors="*{price}"></div>
        </div>

        <div class="form-group mb-2">
            <label for="category">Category:</label>
            <select th:field="*{category.id}" class="form-control" id="category">
                <option value="">Select category</option>
                <option th:each="category : ${categories}" th:value="${category.id}" th:text="${category.name}"></option>
            </select>
        </div>

        <button type="submit" class="btn btn-success mt-2"
                th:text="${product.id == null} ? 'Add Product' : 'Update Product'">Add Product</button>
        <a th:href="@{/products}" class="btn btn-secondary mt-2">Back</a>
    </form>
</div>
</body>
</html>
