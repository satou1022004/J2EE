<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org"
      xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
<head>
    <meta charset="UTF-8">
    <title>Product List</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body>
<nav class="navbar bg-dark border-bottom" data-bs-theme="dark">
    <div class="container-fluid" style="padding-left: 40px; padding-right: 40px">
        <div>
            <a class="navbar-brand text-white" th:href="@{/products}">Products</a>
            <a class="navbar-brand text-white" th:href="@{/cart}">Cart (<span th:text="${cartItemCount}">0</span>)</a>
        </div>
        <form th:action="@{/logout}" method="post">
            <button class="btn btn-outline-light btn-sm" type="submit">Logout</button>
        </form>
    </div>
</nav>

<div class="container mt-4">
    <div th:if="${successMessage}" class="alert alert-success" th:text="${successMessage}"></div>
    <div th:if="${errorMessage}" class="alert alert-danger" th:text="${errorMessage}"></div>

    <div class="d-flex justify-content-between align-items-center mb-3">
        <h2 class="mb-0">Product List</h2>
        <div sec:authorize="hasRole('ADMIN')">
            <a th:href="@{/products/add}" class="btn btn-primary">Create New Product</a>
        </div>
    </div>

    <div class="row g-3 mb-4">
        <div class="col-md-4">
            <div class="card h-100">
                <div class="card-body">
                    <h5 class="card-title">Search By Name</h5>
                    <form th:action="@{/products}" method="get">
                        <input type="hidden" name="categoryId" th:value="${selectedCategoryId}">
                        <input type="hidden" name="sort" th:value="${selectedSort}">
                        <label class="form-label" for="keyword">Keyword</label>
                        <input id="keyword" type="text" name="keyword" class="form-control mb-3" th:value="${keyword}"
                               placeholder="Search by product name">
                        <div class="d-flex gap-2">
                            <button type="submit" class="btn btn-success">Search</button>
                            <a th:href="@{/products(categoryId=${selectedCategoryId}, sort=${selectedSort})}"
                               class="btn btn-outline-secondary">Clear</a>
                        </div>
                    </form>
                </div>
            </div>
        </div>

        <div class="col-md-4">
            <div class="card h-100">
                <div class="card-body">
                    <h5 class="card-title">Filter By Category</h5>
                    <form th:action="@{/products}" method="get">
                        <input type="hidden" name="keyword" th:value="${keyword}">
                        <input type="hidden" name="sort" th:value="${selectedSort}">
                        <label class="form-label" for="categoryId">Category</label>
                        <select id="categoryId" name="categoryId" class="form-select mb-3">
                            <option value="">All Categories</option>
                            <option th:each="category : ${categories}"
                                    th:value="${category.id}"
                                    th:text="${category.name}"
                                    th:selected="${selectedCategoryId != null and selectedCategoryId == category.id}">
                            </option>
                        </select>
                        <div class="d-flex gap-2">
                            <button type="submit" class="btn btn-primary">Filter</button>
                            <a th:href="@{/products(keyword=${keyword}, sort=${selectedSort})}"
                               class="btn btn-outline-secondary">Clear</a>
                        </div>
                    </form>
                </div>
            </div>
        </div>

        <div class="col-md-4">
            <div class="card h-100">
                <div class="card-body">
                    <h5 class="card-title">Sort By Price</h5>
                    <form th:action="@{/products}" method="get">
                        <input type="hidden" name="keyword" th:value="${keyword}">
                        <input type="hidden" name="categoryId" th:value="${selectedCategoryId}">
                        <label class="form-label" for="sort">Sort</label>
                        <select id="sort" name="sort" class="form-select mb-3">
                            <option value="">Default</option>
                            <option value="priceAsc" th:selected="${selectedSort == 'priceAsc'}">Price Ascending</option>
                            <option value="priceDesc" th:selected="${selectedSort == 'priceDesc'}">Price Descending</option>
                        </select>
                        <div class="d-flex gap-2">
                            <button type="submit" class="btn btn-warning">Sort</button>
                            <a th:href="@{/products(keyword=${keyword}, categoryId=${selectedCategoryId})}"
                               class="btn btn-outline-secondary">Clear</a>
                        </div>
                    </form>
                </div>
            </div>
        </div>
    </div>

    <table class="table table-striped align-middle">
        <thead>
        <tr>
            <th>#</th>
            <th>Name</th>
            <th>Image</th>
            <th>Price</th>
            <th>Category</th>
            <th width="220">Cart</th>
            <th width="160"></th>
        </tr>
        </thead>
        <tbody>
        <tr th:if="${#lists.isEmpty(products)}">
            <td colspan="7" class="text-center">No products found.</td>
        </tr>
        <tr th:each="product : ${products}">
            <td th:text="${product.id}"></td>
            <td th:text="${product.name}"></td>
            <td>
                <img th:if="${product.image != null}" height="120" width="150"
                     th:src="@{/products/image/{id}(id=${product.id})}"
                     alt="Product Image">
                <span th:if="${product.image == null}" class="text-muted">No image</span>
            </td>
            <td th:text="${product.price}"></td>
            <td th:text="${product.category != null ? product.category.name : ''}"></td>
            <td>
                <form th:action="@{/cart/add/{id}(id=${product.id})}" method="post" class="d-flex gap-2">
                    <input type="number" name="quantity" min="1" value="1" class="form-control">
                    <button type="submit" class="btn btn-success btn-sm">Add to Cart</button>
                </form>
            </td>
            <td>
                <div sec:authorize="hasRole('ADMIN')" class="d-flex gap-2">
                    <a th:href="@{/products/edit/{id}(id=${product.id})}" class="btn btn-secondary btn-sm">Edit</a>
                    <a th:href="@{/products/delete/{id}(id=${product.id})}" class="btn btn-danger btn-sm">Delete</a>
                </div>
            </td>
        </tr>
        </tbody>
    </table>

    <div class="d-flex justify-content-between align-items-center mt-3" th:if="${totalPages > 0}">
        <a class="btn btn-outline-primary"
           th:classappend="${!hasPrevious} ? ' disabled' : ''"
           th:href="${hasPrevious} ? @{/products(page=${currentPage - 1}, keyword=${keyword}, categoryId=${selectedCategoryId}, sort=${selectedSort})} : '#'"
        >Previous</a>

        <span>
            Page <strong th:text="${currentPage + 1}"></strong> /
            <strong th:text="${totalPages}"></strong>
        </span>

        <a class="btn btn-outline-primary"
           th:classappend="${!hasNext} ? ' disabled' : ''"
           th:href="${hasNext} ? @{/products(page=${currentPage + 1}, keyword=${keyword}, categoryId=${selectedCategoryId}, sort=${selectedSort})} : '#'"
        >Next</a>
    </div>
</div>

<div class="text-center mt-3">
    <hr/>
    <p>&copy; 2025 - Phat trien ung dung voi J2EE</p>
</div>
</body>
</html>
