<!DOCTYPE html>
<html lang="en"
      xmlns:th="http://www.thymeleaf.org"
      xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout">
<head>
    <meta http-equiv="Content-Type" content="text/html; charset=utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1, shrink-to-fit=no">
    <title>Demo Products</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
          rel="stylesheet"
          crossorigin="anonymous">
    <style>
        body { background-color: #fff; }
        .body-content { padding-top: 20px; }
        .navbar-brand { color: #fff !important; }
        .alert-warning { background-color: #fff3cd; border: 1px solid #e0a800; color: #856404; padding: 6px 10px; margin-top: 4px; border-radius: 4px; }
    </style>
</head>
<body>
<nav class="navbar bg-dark" data-bs-theme="dark" style="padding: 8px 20px;">
    <div class="d-flex gap-3">
        <a class="navbar-brand" th:href="@{/products}">Home</a>
        <a class="navbar-brand" th:href="@{/products/create}">Products</a>
    </div>
    <form class="d-flex" role="search" th:action="@{/products}" th:method="get">
        <input class="form-control me-2" type="search" name="keyword" placeholder="Search" aria-label="Search">
        <button class="btn btn-outline-success" type="submit">Search</button>
    </form>
</nav>

<div layout:fragment="content" class="container body-content">
</div>

<div class="text-center mt-4">
    <hr/>
    <p>&copy; 2025 - Phát triển ứng dụng với J2EE</p>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"
        crossorigin="anonymous"></script>
</body>
</html>
